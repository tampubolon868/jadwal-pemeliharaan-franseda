  <div class="container">
<!-- HEADER COVER -->

<div class="cover">

    <!-- KETERANGAN WARNA -->

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <!-- LOCALE INDONESIA -->

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales-all.global.min.js"></script>

  <script>

    document.addEventListener('DOMContentLoaded', function () {

      const events = [];

for(let bulan = 1; bulan <= 12; bulan++){

  const jumlahHari = new Date(2026, bulan, 0).getDate();

  for(let hari = 1; hari <= jumlahHari; hari++){

    const tanggal = new Date(2026, bulan - 1, hari);

    let jenis = "Harian";
    let warna = "green";

    // Mingguan (Jumat)
    if(tanggal.getDay() === 5){
      jenis = "Mingguan";
      warna = "gold";
    }

    // Bulanan
    if(hari === 28){
      jenis = "Bulanan";
      warna = "blue";
    }

    // Triwulan menggantikan Bulanan
    if(hari === 28 && (bulan === 3 || bulan === 9)){
      jenis = "Triwulan";
      warna = "purple";
    }

    // Semesteran menggantikan Triwulan dan Bulanan
    if(hari === 28 && (bulan === 6 || bulan === 12)){
      jenis = "Semesteran";
      warna = "red";
    }

    events.push({
      title: jenis,
      start: `2026-${String(bulan).padStart(2,'0')}-${String(hari).padStart(2,'0')}`,
      color: warna
    });

  }

}
      const calendarEl = document.getElementById('calendar');

      const calendar = new FullCalendar.Calendar(calendarEl, {

        locale: 'id',

        initialView: 'dayGridMonth',

        firstDay: 1,

        height: 'auto',

        buttonText:{
          today:'Hari Ini'
        },

        customButtons: {

          tombolBulan: {
            text: 'Bulan',
            click: function() {
              calendar.changeView('dayGridMonth');
            }
          },

          tombolMinggu: {
            text: 'Minggu',
            click: function() {
              calendar.changeView('timeGridWeek');
            }
          }

        },

        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'tombolBulan,tombolMinggu'
        },

        dayHeaderFormat: {
          weekday: 'long'
        },

        events: events,

        // ==========================================
        // KLIK EVENT
        // ==========================================

        eventClick: function(info){

          alert(

`JADWAL PEMELIHARAAN

Tanggal :
${info.event.start.toLocaleDateString('id-ID')}

Jenis Pemeliharaan :
${info.event.title}

================================================

1. AIRSIDE LIGHTING

• Check Taxiway dan Runway Edge Light
• Check Taxi Guidance Sign
• Check RTIL (Runway Threshold Identification Light)
• Check PAPI (Presision Approah Path Indicator)
• Check Runway End
• Check Threshold
• Check Wind Cone
---------------------------------------
2. POWER HOUSE & ELECTRICAL SYSTEM

• Check Generator Set
• Check Constan Current Regulator (CCR)
• Monitoring Distribusi Aliran Listrik
• Kubikel Tegangan Menengah (TM)
• Trafo Step down
--------------------------------------
3. TERMINAL BUILDING

• Check Lampu Penerangan Terminal
• Check Conveyor Terminal
• Check AC Terminal
• Check Flood Light
--------------------------------------
4. UTILITY SYSTEM

• Check Motor Pompa`

          );

        }

      });

      calendar.render();

    });

  </script>
